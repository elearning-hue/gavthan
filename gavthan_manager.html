<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Gavthan Manager ‚Äî Ledger &amp; Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4ecdc; --surface:#fffdf7; --surface-2:#faf4e6;
    --ink:#2a251d; --muted:#8b8071; --line:#e6dcc6; --line-strong:#d8cbb0;
    --accent:#1f6f54; --accent-ink:#0f3c2d;
    --debit:#b5492a; --credit:#1f6f54; --warn:#b07d11;
    --shadow:0 1px 2px rgba(43,38,29,.06),0 8px 24px rgba(43,38,29,.07);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #fbf6ea 0%, rgba(251,246,234,0) 60%),
      var(--bg);
    color:var(--ink);
    font-family:"DM Sans",system-ui,sans-serif;
    font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:520px;margin:0 auto;min-height:100vh}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0}
  .wrap{padding:0 14px 96px}
  .muted{color:var(--muted)}
  .tiny{font-size:12px}
  .nowrap{white-space:nowrap}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grow{flex:1;min-width:0}
  .ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Header */
  .topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#fffdf7,#fbf5e8);
    border-bottom:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand b{font-family:"Fraunces",serif;font-size:18px;font-weight:700}
  .brand span{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .crest{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-family:"Fraunces",serif;font-weight:700;font-size:18px;flex:0 0 auto}
  .iconbtn{margin-left:auto;border:1px solid var(--line);background:var(--surface);border-radius:10px;
    width:38px;height:38px;display:grid;place-items:center;font-size:16px;color:var(--ink);cursor:pointer}

  /* Module switch */
  .modtabs{display:flex;gap:6px;padding:12px 14px 0}
  .modtab{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:11px 8px;
    text-align:center;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);transition:.15s}
  .modtab .e{font-size:18px;display:block;margin-bottom:2px}
  .modtab.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}

  /* Cards & summary */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-top:12px;overflow:hidden}
  .card .hd{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card .hd h3{font-size:16px}
  .pad{padding:14px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .stat .v{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin-top:3px}
  .stat.green .v{color:var(--credit)} .stat.red .v{color:var(--debit)} .stat.warn .v{color:var(--warn)}

  /* List rows */
  .lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .lrow:last-child{border-bottom:0}
  .lrow:active{background:var(--surface-2)}
  .av{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    font-weight:700;color:#fff;font-size:14px;background:var(--accent)}
  .av.sup{background:#8a5a2b}
  .amt{font-family:"Fraunces",serif;font-weight:600;font-size:16px}
  .amt.d{color:var(--debit)} .amt.c{color:var(--credit)}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid var(--line-strong);color:var(--muted);background:var(--surface-2)}
  .pill.low{color:var(--debit);border-color:#e7c3b6;background:#fbece6}
  .pill.ok{color:var(--credit);border-color:#bfe0d2;background:#eaf6f0}

  /* Buttons / inputs */
  button{font-family:inherit}
  .btn{appearance:none;border:1px solid var(--accent);background:var(--accent);color:#fff;
    padding:11px 14px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;width:100%}
  .btn.sec{background:var(--surface);color:var(--accent);border-color:var(--line-strong)}
  .btn.ghost{background:transparent;color:var(--muted);border-color:var(--line)}
  .btn.danger{background:#fff;color:var(--debit);border-color:#e7c3b6}
  .btn.sm{width:auto;padding:8px 12px;font-size:13px;border-radius:9px}
  .btn:disabled{opacity:.5}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.03em}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line-strong);border-radius:10px;
    background:var(--surface-2);font-size:15px;font-family:inherit;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;background:#fff}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;border:1px solid var(--line-strong);background:var(--surface-2);border-radius:10px;padding:10px;font-weight:600;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .seg.alt button.on{background:var(--debit);border-color:var(--debit)}
  .search{position:relative;margin-top:12px}
  .search input{padding-left:36px}
  .search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.5}

  /* FAB */
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:40;
    width:min(492px,calc(100% - 28px))}
  .fab .btn{box-shadow:0 10px 28px rgba(31,111,84,.35)}

  /* Modal / sheet */
  .scrim{position:fixed;inset:0;background:rgba(40,35,26,.42);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--surface);width:100%;max-width:520px;border-radius:18px 18px 0 0;
    max-height:92vh;overflow:auto;padding:6px 16px 26px;animation:up .22s ease}
  @keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
  .handle{width:42px;height:4px;border-radius:99px;background:var(--line-strong);margin:8px auto 4px}
  .sheet h2{font-size:20px;margin:6px 2px 2px}

  /* Ledger entry line */
  .entry{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .entry:last-child{border-bottom:0}
  .dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:0 0 auto}
  .dot.d{background:var(--debit)} .dot.c{background:var(--credit)}

  .empty{text-align:center;color:var(--muted);padding:34px 16px}
  .empty .e{font-size:34px;display:block;margin-bottom:6px;opacity:.7}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;z-index:80;
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow);max-width:90%;text-align:center}
  .toast.err{background:var(--debit)}

  .banner{background:#fbece6;color:var(--debit);border:1px solid #e7c3b6;border-radius:10px;
    padding:9px 12px;font-size:13px;font-weight:600;margin-top:12px}
  .banner.net{background:#fff3d6;color:var(--warn);border-color:#ecd9a3}

  /* Login */
  .login{max-width:380px;margin:0 auto;padding:48px 22px}
  .login .crest{width:56px;height:56px;font-size:28px;border-radius:14px;margin:0 auto 14px}
  .login h1{text-align:center;font-size:26px}
  .login p.sub{text-align:center;color:var(--muted);margin:4px 0 22px;font-size:14px}
  .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
    display:inline-block;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

<script>
  // Records any CDN script that fails to download, and turns a blank page into a readable message.
  window.__loadErrors = [];
  window.__libFail = function(n){ window.__loadErrors.push(n); };
  window.addEventListener("error", function(e){
    var root = document.getElementById("root");
    if(root && !root.firstChild){
      root.innerHTML =
        '<div style="max-width:440px;margin:46px auto;padding:24px;font-family:system-ui,sans-serif;color:#2a251d;background:#fffdf7;border:1px solid #e6dcc6;border-radius:14px">'
        + '<h2 style="font-family:Georgia,serif;margin:0 0 8px">&#9888; Could not start the app</h2>'

        + '<br><br>Open the console (F12 &rarr; Console) and send me the red error text.</div></div>';

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" onerror="__libFail('React')"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" onerror="__libFail('ReactDOM')"></script>

<script>
"use strict";
(function(){
  function fatal(title, detail){
    var root = document.getElementById("root");
    root.innerHTML =
      '<div style="max-width:440px;margin:46px auto;padding:24px;font-family:system-ui,sans-serif;color:#2a251d;background:#fffdf7;border:1px solid #e6dcc6;border-radius:14px">'
      + '<h2 style="font-family:Georgia,serif;margin:0 0 8px">&#9888; '+title+'</h2>'
      + '<div style="color:#8b8071;font-size:14px;line-height:1.55">'+detail+'</div></div>';
  }
  // Pre-flight: make sure every library actually loaded before we touch it.
  var miss=[];
  if(typeof React==="undefined") miss.push("React");
  if(typeof ReactDOM==="undefined") miss.push("ReactDOM");
  if(typeof htm==="undefined") miss.push("htm");
  if(typeof window.supabase==="undefined" || !window.supabase.createClient) miss.push("supabase-js");
  if((window.__loadErrors&&window.__loadErrors.length) || miss.length){
    var bad = (window.__loadErrors||[]).concat(miss).filter(function(v,i,a){return a.indexOf(v)===i;});
    fatal("A required library didn't load",
      "Missing: <b>"+bad.join(", ")+"</b>.<br><br>This is almost always the network blocking the CDN. "
      + "Try a different network (e.g. mobile data) to confirm, then tell me and I can self-host the libraries inside the file.");
    return;
  }
  var C = window.GH_CONFIG || {};
  if(!C.supabaseUrl || C.supabaseUrl.indexOf("YOUR-PROJECT")>=0 || !C.supabaseAnonKey || C.supabaseAnonKey.indexOf("PASTE_")>=0){
    fatal("Supabase keys not set",
      "Edit the <b>GH_CONFIG</b> block near the bottom of this file, paste your project URL and the legacy anon (eyJ&hellip;) key, then re-deploy to GitHub.");
    return;
  }

  const { useState, useEffect, useMemo, useRef, useCallback } = React;
  const html = htm.bind(React.createElement);
  const CFG = window.GH_CONFIG || {};
  const CUR = CFG.currency || "\u20B9";
  const sb = window.supabase.createClient(CFG.supabaseUrl, CFG.supabaseAnonKey);

  /* ---------- helpers ---------- */
  const money = (n)=> CUR + (Math.round((Number(n)||0)*100)/100).toLocaleString("en-IN");
  const abs = (n)=> money(Math.abs(Number(n)||0));
  const initials = (s)=> (String(s||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("")||"?").toUpperCase();
  const todayISO = ()=> new Date().toISOString().slice(0,10);
  const fmtDate = (d)=>{ if(!d) return ""; const x=new Date(d); return isNaN(x)?String(d):x.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"}); };
  const fmtDT = (d)=>{ if(!d) return ""; const x=new Date(d); return isNaN(x)?String(d):x.toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); };
  const num = (v)=>{ const n=Number(v); return isNaN(n)?0:n; };

  // Defensive bill-total: mirrors the Gavthan billing math, tolerant of schema differences.
  function billTotal(c){
    for (const k of ["bill_amount","total","amount","grand_total","net_total"]) {
      if (c && c[k] != null && c[k] !== "") return num(c[k]);
    }
    let items = c && c.items;
    if (typeof items === "string") { try{ items = JSON.parse(items); }catch(e){ items=[]; } }
    if (!Array.isArray(items)) items = [];
    let sub = items.reduce((s,it)=> s + num(it.qty ?? it.quantity ?? 1) * num(it.price ?? it.rate ?? 0), 0);
    if (c && (c.discount_on || c.discount_pct)) sub = sub * (1 - num(c.discount_pct)/100);
    if (c && (c.adjustment_on || c.adjustment)) sub = sub + num(c.adjustment);
    return Math.round(sub);
  }
  const isSettled = (c)=> !!(c && (c.bill_no || c.settled_at || c.bill_time));
  const custKey = (c)=> (c && (c.phone && String(c.phone).trim())) || ("name:"+String((c&&c.name)||"").trim().toLowerCase());

  /* ---------- tiny toast ---------- */
  let toastFn = ()=>{};
  function useToast(){
    const [t,setT]=useState(null);
    useEffect(()=>{ toastFn=(msg,err)=>{ setT({msg,err}); setTimeout(()=>setT(null), err?3500:2200); }; },[]);
    return t && html`<div class=${"toast"+(t.err?" err":"")}>${t.msg}</div>`;
  }
  const toast=(m)=>toastFn(m,false), toastErr=(m)=>toastFn(m,true);

  /* =====================================================================
     APP ROOT
     ===================================================================== */
  function App(){
    const [boot,setBoot]=useState(true);
    const [session,setSession]=useState(null);
    const [me,setMe]=useState(null);
    const [module,setModule]=useState("ledger");
    const [online,setOnline]=useState(navigator.onLine);
    const toastEl=useToast();

    useEffect(()=>{
      const on=()=>setOnline(true), off=()=>setOnline(false);
      window.addEventListener("online",on); window.addEventListener("offline",off);
      return ()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
    },[]);

    useEffect(()=>{
      sb.auth.getSession().then(({data})=>{ setSession(data.session||null); setBoot(false); });
      const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s||null));
      return ()=> sub.subscription.unsubscribe();
    },[]);

    // load mh_users profile (role/active) after login
    useEffect(()=>{
      if(!session){ setMe(null); return; }
      (async()=>{
        try{
          const email = session.user.email;
          const { data } = await sb.from("mh_users").select("*").eq("email",email).maybeSingle();
          setMe(data || { email, role:"staff", active:true });
        }catch(e){ setMe({ email:session.user.email, role:"staff", active:true }); }
      })();
    },[session]);

    if(boot) return html`<div class="login"><div class="crest">${(CFG.hotelName||"G")[0]}</div><p class="sub">Loading‚Ä¶</p></div>`;
    if(!session) return html`<${Login} />${toastEl}`;
    if(me && me.active===false)
      return html`<div class="login"><h1>Account disabled</h1><p class="sub">Ask an admin to re-enable your login.</p><button class="btn sec" onClick=${()=>sb.auth.signOut()}>Sign out</button></div>`;

    return html`
      <${Header} me=${me} module=${module} />
      ${!online && html`<div class="wrap" style=${{paddingBottom:0}}><div class="banner net">‚öÝ Offline ‚Äî changes will fail until reconnected.</div></div>`}
      <div class="modtabs">
        <div class=${"modtab"+(module==="ledger"?" on":"")} onClick=${()=>setModule("ledger")}>
          <span class="e">üìí</span>Ledger</div>
        <div class=${"modtab"+(module==="inventory"?" on":"")} onClick=${()=>setModule("inventory")}>
          <span class="e">üì¶</span>Inventory</div>
      </div>
      ${module==="ledger" ? html`<${Ledger} me=${me} online=${online}/>` : html`<${Inventory} me=${me} online=${online}/>`}
      ${toastEl}
    `;
  }

  function Header({me,module}){
    return html`<div class="topbar">
      <div class="crest">${(CFG.hotelName||"G")[0]}</div>
      <div class="brand"><b>${CFG.hotelName||"Gavthan"} Manager</b>
        <span>${module==="ledger"?"Khata ¬∑ Receivables & Payables":"Stock ¬∑ Inventory control"}</span></div>
      <button class="iconbtn" title=${"Sign out ("+(me?me.email:"")+")"} onClick=${()=>{ if(confirm("Sign out?")) sb.auth.signOut(); }}>‚éã</button>
    </div>`;
  }

  /* =====================================================================
     LOGIN  (reuses Supabase auth + your existing mh_users)
     ===================================================================== */
  function Login(){
    const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
    const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
    async function submit(e){
      e&&e.preventDefault(); setErr(""); setBusy(true);
      const { error } = await sb.auth.signInWithPassword({ email:email.trim(), password:pw });
      setBusy(false);
      if(error) setErr(error.message||"Login failed");
    }
    return html`<form class="login" onSubmit=${submit}>
      <div class="crest">${(CFG.hotelName||"G")[0]}</div>
      <h1>${CFG.hotelName||"Gavthan"} Manager</h1>
      <p class="sub">Ledger &amp; Inventory ¬∑ sign in with your staff account</p>
      ${err && html`<div class="banner">${err}</div>`}
      <label>Email</label>
      <input type="email" value=${email} autoComplete="username" onChange=${e=>setEmail(e.target.value)} placeholder="you@hotel.com"/>
      <label>Password</label>
      <input type="password" value=${pw} autoComplete="current-password" onChange=${e=>setPw(e.target.value)} placeholder="‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢"/>
      <div style=${{height:18}}></div>
      <button class="btn" disabled=${busy||!email||!pw}>${busy?html`<span class="spin"></span> Signing in‚Ä¶`:"Sign in"}</button>
      <p class="tiny muted" style=${{marginTop:16,textAlign:"center"}}>Same login as your billing app. New staff must be added by an admin.</p>
    </form>`;
  }

  /* =====================================================================
     LEDGER MODULE
     Convention: balance = Œ£debit ‚àí Œ£credit  (per party)
       Customer:  sale/bill = debit (+, they owe you) ¬∑ payment received = credit (‚àí)
       Supplier:  payment you made = debit (+) ¬∑ purchase = credit (‚àí)
       balance > 0 ‚Üí party owes you (receivable)
       balance < 0 ‚Üí you owe party  (payable)
     ===================================================================== */
  function Ledger({me,online}){
    const [parties,setParties]=useState([]);
    const [entries,setEntries]=useState([]);
    const [bills,setBills]=useState([]);
    const [loading,setLoading]=useState(true);
    const [q,setQ]=useState("");
    const [tab,setTab]=useState("customer");      // customer | supplier
    const [openParty,setOpenParty]=useState(null);
    const [showAdd,setShowAdd]=useState(false);    // add party
    const [pay,setPay]=useState(null);             // {party} -> record payment/entry
    const [importing,setImporting]=useState(false);

    const load=useCallback(async()=>{
      setLoading(true);
      try{
        const [p,e,c] = await Promise.all([
          sb.from("mh_parties").select("*").order("name"),
          sb.from("mh_ledger").select("*").order("entry_date",{ascending:false}).order("created_at",{ascending:false}),
          sb.from("mh_customers").select("*")
        ]);
        if(p.error) throw p.error;
        if(e.error) throw e.error;
        setParties(p.data||[]);
        setEntries(e.data||[]);
        setBills((c.data||[]).filter(isSettled));
      }catch(err){ toastErr(err.message||"Load failed"); }
      setLoading(false);
    },[]);
    useEffect(()=>{ load(); },[load]);

    const balByParty=useMemo(()=>{
      const m={};
      parties.forEach(p=> m[p.id]= num(p.opening_balance));
      entries.forEach(en=>{
        if(m[en.party_id]==null) m[en.party_id]=0;
        m[en.party_id]+= en.entry_type==="debit"? num(en.amount): -num(en.amount);
      });
      return m;
    },[parties,entries]);

    const lastEntryByParty=useMemo(()=>{
      const m={}; entries.forEach(en=>{ if(!m[en.party_id]) m[en.party_id]=en; }); return m;
    },[entries]);

    const list=useMemo(()=>{
      const s=q.trim().toLowerCase();
      return parties
        .filter(p=> (p.type||"customer")===tab)
        .filter(p=> !s || (p.name||"").toLowerCase().includes(s) || String(p.phone||"").includes(s))
        .map(p=>({ ...p, bal: balByParty[p.id]||0, last:lastEntryByParty[p.id] }))
        .sort((a,b)=> Math.abs(b.bal)-Math.abs(a.bal));
    },[parties,tab,q,balByParty,lastEntryByParty]);

    const receivable = useMemo(()=> parties.filter(p=>(p.type||"customer")==="customer")
      .reduce((s,p)=> s + Math.max(0, balByParty[p.id]||0), 0),[parties,balByParty]);
    const payable = useMemo(()=> parties
      .reduce((s,p)=> s + Math.max(0, -(balByParty[p.id]||0)), 0),[parties,balByParty]);

    // how many settled bills are not yet imported into the ledger
    const importedRefs=useMemo(()=>{ const s=new Set(); entries.forEach(e=>{ if(e.source==="bill"&&e.ref) s.add(String(e.ref)); }); return s; },[entries]);
    const pendingBills=useMemo(()=> bills.filter(b=> b.bill_no!=null && !importedRefs.has(String(b.bill_no)) && billTotal(b)>0),[bills,importedRefs]);

    async function importBills(){
      if(!pendingBills.length){ toast("No new bills to import"); return; }
      setImporting(true);
      try{
        // index existing customer parties by key
        const byKey={}; parties.forEach(p=>{ if((p.type||"customer")==="customer") byKey[ (p.phone&&String(p.phone).trim())||("name:"+(p.name||"").toLowerCase()) ]=p; });
        const newParties=[];
        for(const b of pendingBills){
          const k=custKey(b);
          if(!byKey[k] && !newParties.find(x=>x.__k===k)){
            newParties.push({ __k:k, name:(b.name||"Guest").trim()||"Guest", phone:(b.phone||null), type:"customer", opening_balance:0, created_by:me&&me.email });
          }
        }
        if(newParties.length){
          const ins=newParties.map(({__k,...r})=>r);
          const { data, error } = await sb.from("mh_parties").insert(ins).select();
          if(error) throw error;
          (data||[]).forEach((p,i)=>{ byKey[newParties[i].__k]=p; });
        }
        const rows=pendingBills.map(b=>({
          party_id: byKey[custKey(b)].id,
          entry_type:"debit",
          amount: billTotal(b),
          mode:"credit",
          ref: String(b.bill_no),
          note:"Bill #"+b.bill_no,
          entry_date:(b.bill_time||b.settled_at||b.created_at||new Date().toISOString()).slice(0,10),
          source:"bill",
          created_by: me&&me.email
        }));
        const { error:e2 } = await sb.from("mh_ledger").insert(rows);
        if(e2) throw e2;
        toast("Imported "+rows.length+" bill"+(rows.length>1?"s":""));
        await load();
      }catch(err){ toastErr(err.message||"Import failed"); }
      setImporting(false);
    }

    if(loading) return html`<div class="wrap"><div class="empty"><span class="spin" style=${{borderColor:'var(--line-strong)',borderTopColor:'var(--accent)'}}></span><div style=${{marginTop:10}}>Loading ledger‚Ä¶</div></div></div>`;

    return html`<div class="wrap">
      <div class="stats">
        <div class="stat green"><div class="k">To collect</div><div class="v">${money(receivable)}</div></div>
        <div class="stat red"><div class="k">To pay</div><div class="v">${money(payable)}</div></div>
      </div>

      ${pendingBills.length>0 && html`<div class="card"><div class="pad between">
        <div><b>${pendingBills.length}</b> settled bill${pendingBills.length>1?"s":""} not in ledger
          <div class="tiny muted">Total ${money(pendingBills.reduce((s,b)=>s+billTotal(b),0))}</div></div>
        <button class="btn sm" disabled=${importing||!online} onClick=${importBills}>${importing?html`<span class="spin"></span>`:"Import"}</button>
      </div></div>`}

      <div class="seg" style=${{marginTop:12}}>
        <button class=${tab==="customer"?"on":""} onClick=${()=>setTab("customer")}>Customers</button>
        <button class=${tab==="supplier"?"on":""} onClick=${()=>setTab("supplier")}>Suppliers</button>
      </div>
      <div class="search"><span class="ic">üîç</span>
        <input placeholder=${"Search "+tab+"s"} value=${q} onChange=${e=>setQ(e.target.value)}/></div>

      <div class="card" style=${{marginTop:12}}>
        ${list.length===0 ? html`<div class="empty"><span class="e">${tab==="customer"?"üßæ":"üöö"}</span>
            No ${tab}s yet${tab==="customer"?". Import bills or add one.":". Add your first supplier."}</div>`
        : list.map(p=> html`<div class="lrow" key=${p.id} onClick=${()=>setOpenParty(p)}>
            <div class=${"av"+(tab==="supplier"?" sup":"")}>${initials(p.name)}</div>
            <div class="grow">
              <div class="ell"><b>${p.name}</b></div>
              <div class="tiny muted ell">${p.phone? "üìû "+p.phone+" ¬∑ ":""}${p.last? (p.last.note||p.last.entry_type)+" ¬∑ "+fmtDate(p.last.entry_date):"No activity"}</div>
            </div>
            <div style=${{textAlign:"right"}}>
              <div class=${"amt "+(p.bal>=0?"d":"c")}>${abs(p.bal)}</div>
              <div class="tiny muted">${p.bal>0?"owes you":p.bal<0?"you owe":"settled"}</div>
            </div>
          </div>`)}
      </div>
    </div>

    <div class="fab"><button class="btn" onClick=${()=>setShowAdd(true)}>Ôºã New ${tab}</button></div>

    ${showAdd && html`<${AddPartySheet} type=${tab} me=${me} onClose=${()=>setShowAdd(false)} onSaved=${()=>{setShowAdd(false);load();}}/>`}

    ${openParty && html`<${PartySheet}
        party=${openParty} balance=${balByParty[openParty.id]||0}
        entries=${entries.filter(e=>e.party_id===openParty.id)}
        onClose=${()=>setOpenParty(null)}
        onPay=${()=>{ setPay(openParty); setOpenParty(null); }}
        onChanged=${load} me=${me} online=${online}/>`}

    ${pay && html`<${PaymentSheet} party=${pay} me=${me} onClose=${()=>setPay(null)} onSaved=${()=>{setPay(null);load();}}/>`}
    `;
  }

  function Inventory({me,online}){
    const [items,setItems]=useState([]);

    const [q,setQ]=useState(""); const [filter,setFilter]=useState("all"); // all | low

    const [history,setHistory]=useState(null);

    const load=useCallback(async()=>{
      setLoading(true);
      try{
        const [i,m,s]=await Promise.all([
          sb.from("mh_inventory_items").select("*").order("name"),
          sb.from("mh_stock_moves").select("*").order("created_at",{ascending:false}).limit(300),
          sb.from("mh_parties").select("id,name").eq("type","supplier").order("name")

    const isLow=(it)=> num(it.reorder_level)>0 && num(it.qty)<=num(it.reorder_level);

    const list=useMemo(()=>{

    if(loading) return html`<div class="wrap"><div class="empty"><span class="spin" style=${{borderColor:'var(--line-strong)',borderTopColor:'var(--accent)'}}></span><div style=${{marginTop:10}}>Loading stock‚Ä¶</div></div></div>`;

    return html`<div class="wrap">

      <div class="card" style=${{marginTop:12}}>
        ${list.length===0 ? html`<div class="empty"><span class="e">üì¶</span>${items.length?"Nothing matches.":"No items yet. Add your first stock item."}</div>`
        : list.map(it=> html`<div class="lrow" key=${it.id} onClick=${()=>setMoveFor(it)}>
            <div class="grow">
              <div class="row" style=${{gap:7}}><b class="ell">${it.name}</b>
                ${isLow(it)? html`<span class="pill low">low</span>`: html`<span class="pill ok">ok</span>`}</div>
              <div class="tiny muted ell">${it.category?it.category+" ¬∑ ":""}${it.cost_price?money(it.cost_price)+"/"+(it.unit||"unit"):""}${num(it.reorder_level)>0?" ¬∑ reorder @ "+num(it.reorder_level):""}</div>
            </div>
            <div style=${{textAlign:"right"}}>
              <div class="amt" style=${{color:isLow(it)?'var(--debit)':'var(--ink)'}}>${num(it.qty)}</div>
              <div class="tiny muted">${it.unit||"units"}</div>
            </div>
            <button class="btn ghost sm" style=${{width:36,padding:8}} onClick=${(e)=>{e.stopPropagation();setEdit(it);}}>‚úé</button>
          </div>`)}

      <div class="card"><div class="hd"><h3>Recent stock moves</h3>

      </${Sheet}>`}
    `;
  }

  function ItemSheet({item,suppliers,me,onClose,onSaved}){

    const [busy,setBusy]=useState(false);
    const set=(k)=>(e)=> setF(o=>({...o,[k]:e.target.value}));
    async function save(){
      if(!f.name.trim()) return;
      setBusy(true);
      try{
        const row={ name:f.name.trim(), category:f.category.trim()||null, unit:f.unit.trim()||"unit",

        } else {

      </div>

      <div class="row" style=${{gap:10}}>
        <div class="grow"><label>Reorder level</label><input value=${f.reorder_level} onChange=${set("reorder_level")} inputMode="decimal"/></div>
        <div class="grow"><label>Cost / ${f.unit||"unit"}</label><input value=${f.cost_price} onChange=${set("cost_price")} inputMode="decimal" placeholder="0"/></div>

      </select>
      ${!isNew && html`<p class="tiny muted" style=${{marginTop:10}}>To change the stock count, tap the item and record a movement instead ‚Äî that keeps an audit trail.</p>`}
      <div style=${{height:14}}></div>
      <button class="btn" disabled=${busy||!f.name.trim()} onClick=${save}>${busy?"Saving‚Ä¶":isNew?"Add item":"Save changes"}</button>
      ${!isNew && html`<button class="btn danger sm" style=${{width:"100%",marginTop:10}} disabled=${busy} onClick=${archive}>Archive item</button>`}
    </${Sheet}>`;
  }

  function MoveSheet({item,suppliers,me,onClose,onSaved}){
    const [type,setType]=useState("in");
    const [qty,setQty]=useState(""); const [cost,setCost]=useState(item.cost_price?String(item.cost_price):"");
    const [note,setNote]=useState(""); const [date,setDate]=useState(todayISO());
    const [supplierLedger,setSupplierLedger]=useState(false);
    const [busy,setBusy]=useState(false);
    const supplier = suppliers.find(s=>s.id===item.supplier_id);
    const cur=num(item.qty);
    const q=num(qty);
    const projected = type==="in"? cur+q : type==="adjust"? q : cur-q;

    async function save(){
      if(type!=="adjust" && q<=0){ return; }
      setBusy(true);
      try{
        const delta = type==="in"? q : type==="adjust"? (q-cur) : -q;
        // record the movement
        const { error:e1 } = await sb.from("mh_stock_moves").insert({
          item_id:item.id, move_type:type, qty: type==="adjust"? Math.abs(delta) : q,
          unit_cost: type==="in"? (num(cost)||null) : null,
          note: note.trim() || null, move_date:date, created_by:me&&me.email });
        if(e1) throw e1;
        // update item stock (+ latest cost on purchase)
        const upd={ qty: Math.round(projected*1000)/1000, updated_at:new Date().toISOString() };
        if(type==="in" && num(cost)>0) upd.cost_price=num(cost);
        const { error:e2 } = await sb.from("mh_inventory_items").update(upd).eq("id",item.id);
        if(e2) throw e2;
        // optional: also post to supplier ledger as a purchase (credit = you owe them)
        if(type==="in" && supplierLedger && item.supplier_id && num(cost)>0){
          const amount=q*num(cost);
          const { error:e3 } = await sb.from("mh_ledger").insert({
            party_id:item.supplier_id, entry_type:"credit", amount, mode:"credit",
            note:"Purchase: "+item.name+" √ó"+q, entry_date:date, source:"manual", created_by:me&&me.email });
          if(e3) throw e3;
        }
        toast("Stock updated"); onSaved();
      }catch(err){ toastErr(err.message||"Save failed"); setBusy(false); }
    }

    return html`<${Sheet} onClose=${onClose} title=${item.name}>
      <div class="between" style=${{margin:"2px 2px 6px"}}>
        <span class="tiny muted">${item.category||""}</span>
        <span class="tiny muted">Current: <b style=${{color:'var(--ink)'}}>${cur} ${item.unit||""}</b></span>
      </div>
      <label>Movement</label>
      <div class="seg ${type==='out'||type==='waste'?'alt':''}">
        ${[["in","Purchase"],["out","Used"],["waste","Waste"],["adjust","Set to"]].map(o=>
          html`<button key=${o[0]} class=${type===o[0]?"on":""} onClick=${()=>setType(o[0])}>${o[1]}</button>`)}
      </div>
      <label>${type==="adjust"?"New counted stock":"Quantity"} (${item.unit||"unit"})</label>
      <input value=${qty} onChange=${e=>setQty(e.target.value)} inputMode="decimal" autoFocus placeholder="0"/>
      ${type==="in" && html`<div>
        <label>Cost / ${item.unit||"unit"} (optional, updates item cost)</label>
        <input value=${cost} onChange=${e=>setCost(e.target.value)} inputMode="decimal" placeholder="0"/>
        ${item.supplier_id && html`<label class="row" style=${{textTransform:'none',letterSpacing:0,marginTop:12,gap:8,alignItems:'center'}}>
          <input type="checkbox" style=${{width:18,height:18}} checked=${supplierLedger} onChange=${e=>setSupplierLedger(e.target.checked)}/>
          <span>Also add ${money(q*num(cost))} to ${supplier?supplier.name:"supplier"}‚Äôs ledger</span></label>`}
      </div>`}
      <label>Date</label><input type="date" value=${date} onChange=${e=>setDate(e.target.value)}/>
      <label>Note (optional)</label><input value=${note} onChange=${e=>setNote(e.target.value)} placeholder="invoice no, reason‚Ä¶"/>
      <div class="banner" style=${{background:'var(--surface-2)',color:'var(--ink)',borderColor:'var(--line-strong)'}}>
        New stock: <b>${isNaN(projected)?cur:Math.round(projected*1000)/1000} ${item.unit||""}</b>
      </div>
      <div style=${{height:14}}></div>
      <button class="btn" disabled=${busy||(type!=="adjust"&&q<=0)} onClick=${save}>${busy?"Saving‚Ä¶":"Record movement"}</button>
    </${Sheet}>`;
  }

  /* ---------- generic bottom sheet ---------- */
  function Sheet({title,onClose,children}){
    useEffect(()=>{ const k=(e)=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",k); return ()=>window.removeEventListener("keydown",k); },[onClose]);
    return html`<div class="scrim" onClick=${onClose}>
      <div class="sheet" onClick=${e=>e.stopPropagation()}>
        <div class="handle"></div>
        <div class="between"><h2>${title}</h2><button class="iconbtn" style=${{marginLeft:0}} onClick=${onClose}>‚úï</button></div>
        <div style=${{height:6}}></div>
        ${children}
      </div>
    </div>`;
  }

  try{
    ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
  }catch(e){
    fatal("App failed to start", String((e&&e.message)||e)+"<br><br>Please send me this message and the console error.");
  }
})();
</script>
</body>
</html>
